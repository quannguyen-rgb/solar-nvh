  <!-- Tia nắng -->
  <g stroke="#FF6B00" stroke-width="18" stroke-linecap="round">
    <line x1="256" y1="68" x2="256" y2="40"/>
    <line x1="348" y1="88" x2="366" y2="70"/>
    <line x1="388" y1="180" x2="416" y2="180"/>
    <line x1="348" y1="272" x2="366" y2="290"/>
