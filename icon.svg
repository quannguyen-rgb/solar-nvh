  <!-- Phản sáng panel -->
  <rect x="88" y="308" width="100" height="54" rx="6" fill="white" opacity="0.08"/>
  <rect x="205" y="308" width="100" height="54" rx="6" fill="white" opacity="0.08"/>
  <rect x="322" y="308" width="100" height="54" rx="6" fill="white" opacity="0.08"/>
